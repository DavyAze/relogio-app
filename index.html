<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RELOGIO DAVY</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="container">
        <div class="clock">
            <div class="time-block" id="hours">00</div>
            <div class="separator">:</div>
            <div class="time-block" id="minutes">00</div>
            <div class="separator">:</div>
            <div class="time-block" id="seconds">00</div>
        </div>

        <div id="date" class="date-display">-- / -- / ----</div>

        <footer class="credits">
            Criado por <span>Davy Azevedo</span>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
